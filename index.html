<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>授業向け ドローンシミュレーター</title>
<style>
.drone-sc-wrap{
  width:100% !important;
  display:flex !important;
  justify-content:center !important;
  align-items:flex-start !important;
  margin:0 auto !important;
  padding:0 !important;
  clear:both !important;
  float:none !important;
}

.drone-sc-app{
  width:100% !important;
  max-width:1080px !important;
  margin:0 auto !important;
  padding:18px !important;
  box-sizing:border-box !important;
  background:#eef5fb !important;
  color:#222 !important;
  font-family:sans-serif !important;
  border-radius:18px !important;
}

.drone-sc-app *{
  box-sizing:border-box !important;
}

.drone-sc-title{
  text-align:center !important;
  font-size:clamp(28px,4vw,46px) !important;
  font-weight:700 !important;
  margin:4px 0 8px !important;
  line-height:1.25 !important;
}

.drone-sc-subtitle{
  text-align:center !important;
  font-size:14px !important;
  line-height:1.7 !important;
  margin:0 0 14px !important;
  color:#333 !important;
}

.drone-sc-canvas{
  display:block !important;
  width:90% !important;
  max-width:760px !important;
  height:auto !important;
  margin:0 auto 16px auto !important;
  background:#fff !important;
  border:3px solid #bcc6cf !important;
  border-radius:22px !important;
  touch-action:manipulation !important;
}

.drone-sc-panel{
  width:100% !important;
  max-width:760px !important;
  margin:0 auto !important;
  display:grid !important;
  grid-template-columns:1fr 1fr !important;
  gap:12px !important;
}

.drone-sc-full{
  grid-column:1 / -1 !important;
}

.drone-sc-card{
  background:#fff !important;
  border:1px solid #d8dee5 !important;
  border-radius:16px !important;
  padding:14px !important;
  box-shadow:0 2px 8px rgba(0,0,0,0.03) !important;
}

.drone-sc-card-title{
  font-weight:700 !important;
  font-size:16px !important;
  margin-bottom:10px !important;
}

.drone-sc-row{
  display:flex !important;
  flex-wrap:wrap !important;
  gap:10px !important;
  justify-content:center !important;
  align-items:center !important;
  margin-bottom:10px !important;
}

.drone-sc-row:last-child{
  margin-bottom:0 !important;
}

.drone-sc-btn,
.drone-sc-input{
  font-size:16px !important;
  border-radius:14px !important;
}

.drone-sc-btn{
  border:none !important;
  color:#fff !important;
  background:#4e8ef7 !important;
  padding:13px 16px !important;
  min-width:96px !important;
  cursor:pointer !important;
  line-height:1.2 !important;
  white-space:nowrap !important;
}

.drone-sc-btn:active{
  transform:scale(0.97) !important;
}

.drone-sc-green{ background:#33aa66 !important; }
.drone-sc-red{ background:#dd5a5a !important; }
.drone-sc-gray{ background:#777 !important; }
.drone-sc-orange{ background:#d88a2f !important; }
.drone-sc-purple{ background:#7a5bd8 !important; }

.drone-sc-label{
  display:inline-flex !important;
  align-items:center !important;
  gap:6px !important;
  background:#fff !important;
  border:1px solid #ddd !important;
  border-radius:12px !important;
  padding:8px 10px !important;
  font-size:14px !important;
}

.drone-sc-input{
  width:78px !important;
  padding:7px 8px !important;
  border:1px solid #bbb !important;
  background:#fff !important;
  color:#222 !important;
}

.drone-sc-status{
  line-height:1.8 !important;
  font-size:14px !important;
}

.drone-sc-help{
  line-height:1.8 !important;
  font-size:13px !important;
  color:#555 !important;
}

@media (max-width:768px){
  .drone-sc-app{
    padding:10px !important;
  }

  .drone-sc-canvas{
    width:88% !important;
  }

  .drone-sc-panel{
    grid-template-columns:1fr !important;
  }

  .drone-sc-btn{
    min-width:88px !important;
    padding:12px 14px !important;
    font-size:15px !important;
  }

  .drone-sc-label{
    width:100% !important;
    justify-content:space-between !important;
  }

  .drone-sc-title{
    font-size:22px !important;
  }

  .drone-sc-subtitle{
    font-size:13px !important;
  }
}
</style>
</head>
<body>

<div class="drone-sc-wrap">
  <div class="drone-sc-app">
    <div class="drone-sc-title">授業向け ドローンシミュレーター</div>
    <div class="drone-sc-subtitle">
      タップで始点変更・yaw角度指定・三角/四角/円/多角形飛行に対応
    </div>

    <canvas id="droneScCanvas" class="drone-sc-canvas" width="500" height="420"></canvas>

    <div class="drone-sc-panel">
      <div class="drone-sc-card drone-sc-full">
        <div class="drone-sc-row">
          <button class="drone-sc-btn drone-sc-green" id="droneScTakeoffBtn">離陸</button>
          <button class="drone-sc-btn drone-sc-red" id="droneScLandBtn">着陸</button>
          <button class="drone-sc-btn drone-sc-gray" id="droneScClearBtn">軌跡クリア</button>
          <button class="drone-sc-btn drone-sc-orange" id="droneScResetBtn">中央へ戻す</button>
        </div>
      </div>

      <div class="drone-sc-card">
        <div class="drone-sc-card-title">手動操作</div>
        <div class="drone-sc-row">
          <button class="drone-sc-btn" id="droneScYawLeftBtn">yaw 左</button>
          <button class="drone-sc-btn" id="droneScForwardBtn">前進</button>
          <button class="drone-sc-btn" id="droneScYawRightBtn">yaw 右</button>
        </div>
        <div class="drone-sc-row">
          <button class="drone-sc-btn" id="droneScLeftBtn">左移動</button>
          <button class="drone-sc-btn" id="droneScBackBtn">後退</button>
          <button class="drone-sc-btn" id="droneScRightBtn">右移動</button>
        </div>
      </div>

      <div class="drone-sc-card">
        <div class="drone-sc-card-title">ミッション</div>
        <div class="drone-sc-row">
          <button class="drone-sc-btn" id="droneScTriangleBtn">三角飛行</button>
          <button class="drone-sc-btn" id="droneScSquareBtn">四角飛行</button>
          <button class="drone-sc-btn" id="droneScCircleBtn">円飛行</button>
        </div>
        <div class="drone-sc-row">
          <label class="drone-sc-label">辺の数
            <input class="drone-sc-input" type="number" id="droneScSidesInput" value="5" min="3" max="12">
          </label>
          <label class="drone-sc-label">辺の長さ
            <input class="drone-sc-input" type="number" id="droneScLengthInput" value="90" min="30" max="200">
          </label>
          <button class="drone-sc-btn drone-sc-purple" id="droneScPolygonBtn">多角形飛行</button>
        </div>
      </div>

      <div class="drone-sc-card">
        <div class="drone-sc-card-title">角度設定</div>
        <div class="drone-sc-row">
          <label class="drone-sc-label">yaw角度
            <input class="drone-sc-input" type="number" id="droneScYawInput" value="0" min="0" max="359">
          </label>
          <button class="drone-sc-btn" id="droneScSetYawBtn">角度設定</button>
        </div>
      </div>

      <div class="drone-sc-card drone-sc-full">
        <div class="drone-sc-card-title">状態表示</div>
        <div class="drone-sc-status" id="droneScStatusBox"></div>
      </div>

      <div class="drone-sc-card drone-sc-full">
        <div class="drone-sc-card-title">使い方</div>
        <div class="drone-sc-help">
          ・キャンバスをタップすると始点を変更できます。<br>
          ・yawを変えると、前進方向が変わります。<br>
          ・三角/四角/円/多角形の軌跡を授業と同じように見れます。<br>
          ・外角 = 360 ÷ 辺の数
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var canvas = document.getElementById("droneScCanvas");
  if (!canvas) return;
  var ctx = canvas.getContext("2d");

  var statusBox = document.getElementById("droneScStatusBox");
  var yawInput = document.getElementById("droneScYawInput");
  var sidesInput = document.getElementById("droneScSidesInput");
  var lengthInput = document.getElementById("droneScLengthInput");

  function clamp(value, min, max){
    return Math.max(min, Math.min(max, value));
  }

  function isMobileCanvas() {
    return canvas.width <= 520;
  }

  function Drone(x, y) {
    this.startX = x;
    this.startY = y;
    this.x = x;
    this.y = y;

    this.altitude = 0;
    this.targetAltitude = 0;
    this.angle = 0;
    this.flying = false;

    this.path = [];
    this.autoMode = false;
    this.autoCommands = [];
    this.currentCommand = null;

    this.circleMode = false;
    this.circleCenterX = 0;
    this.circleCenterY = 0;
    this.circleRadius = 80;
    this.circleAngle = 0;
    this.circleSpeed = 2;
    this.circleDoneAngle = 0;
    this.circleRounds = 1;

    this.battery = 100;
    this.modeText = "停止中";
  }

  Drone.prototype.takeoff = function() {
    if (!this.flying && this.battery > 0) {
      this.flying = true;
      this.targetAltitude = 60;
      this.modeText = "手動飛行";
    }
  };

  Drone.prototype.land = function() {
    this.targetAltitude = 0;
    this.autoMode = false;
    this.autoCommands = [];
    this.currentCommand = null;
    this.circleMode = false;
    this.modeText = "着陸中";
  };

  Drone.prototype.clearPath = function() {
    this.path = [];
  };

  Drone.prototype.resetToCenter = function() {
    this.startX = canvas.width / 2;
    this.startY = canvas.height / 2;
    this.x = this.startX;
    this.y = this.startY;
    this.altitude = 0;
    this.targetAltitude = 0;
    this.flying = false;
    this.autoMode = false;
    this.circleMode = false;
    this.autoCommands = [];
    this.currentCommand = null;
    this.modeText = "停止中";
    this.path = [];
  };

  Drone.prototype.setStartPosition = function(x, y) {
    if (this.autoMode || this.circleMode) return;
    this.startX = x;
    this.startY = y;
    this.x = x;
    this.y = y;
  };

  Drone.prototype.setYaw = function(deg) {
    this.angle = ((deg % 360) + 360) % 360;
  };

  Drone.prototype.moveInYawDirection = function(distance) {
    var rad = this.angle * Math.PI / 180;
    this.x += Math.cos(rad) * distance;
    this.y += Math.sin(rad) * distance;
  };

  Drone.prototype.moveSideways = function(distance) {
    var rad = (this.angle + 90) * Math.PI / 180;
    this.x += Math.cos(rad) * distance;
    this.y += Math.sin(rad) * distance;
  };

  Drone.prototype.yawLeft = function() {
    if (!this.flying || this.altitude <= 0) return;
    this.angle -= 15;
  };

  Drone.prototype.yawRight = function() {
    if (!this.flying || this.altitude <= 0) return;
    this.angle += 15;
  };

  Drone.prototype.forward = function() {
    if (!this.flying || this.altitude <= 0) return;
    this.moveInYawDirection(15);
    this.consumeBattery(0.3);
  };

  Drone.prototype.back = function() {
    if (!this.flying || this.altitude <= 0) return;
    this.moveInYawDirection(-15);
    this.consumeBattery(0.3);
  };

  Drone.prototype.left = function() {
    if (!this.flying || this.altitude <= 0) return;
    this.moveSideways(-15);
    this.consumeBattery(0.3);
  };

  Drone.prototype.right = function() {
    if (!this.flying || this.altitude <= 0) return;
    this.moveSideways(15);
    this.consumeBattery(0.3);
  };

  Drone.prototype.startPolygonMission = function(sides, length) {
    if (sides < 3 || this.battery <= 0) return;

    if (isMobileCanvas()) {
      this.x = canvas.width / 2;
      this.y = canvas.height / 2;
    }

    if (!this.flying) {
      this.takeoff();
    }

    this.autoMode = true;
    this.circleMode = false;
    this.autoCommands = [];
    this.currentCommand = null;
    this.modeText = sides + "角形飛行";

    var turnAngle = 360 / sides;
    for (var i = 0; i < sides; i++) {
      this.autoCommands.push({ type: "move", value: length });
      this.autoCommands.push({ type: "rotate", value: turnAngle });
    }
  };

  Drone.prototype.startTriangleMission = function() {
    if (isMobileCanvas()) {
      this.startPolygonMission(3, 42);
    } else {
      this.startPolygonMission(3, 130);
    }
  };

  Drone.prototype.startSquareMission = function() {
    if (isMobileCanvas()) {
      this.startPolygonMission(4, 38);
    } else {
      this.startPolygonMission(4, 100);
    }
  };

  Drone.prototype.startCircleMission = function(radius, rounds) {
    radius = typeof radius === "number" ? radius : 80;
    rounds = typeof rounds === "number" ? rounds : 1;

    if (this.battery <= 0) return;

    if (!this.flying) {
      this.takeoff();
    }

    if (isMobileCanvas()) {
      this.x = canvas.width / 2;
      this.y = canvas.height / 2;
    }

    this.autoMode = false;
    this.autoCommands = [];
    this.currentCommand = null;

    this.circleMode = true;
    this.modeText = "円飛行";
    this.circleRadius = radius;
    this.circleRounds = rounds;
    this.circleCenterX = this.x;
    this.circleCenterY = this.y;
    this.circleAngle = -90;
    this.circleDoneAngle = 0;
  };

  Drone.prototype.consumeBattery = function(amount) {
    this.battery -= amount;
    if (this.battery < 0) this.battery = 0;
    if (this.battery <= 0) {
      this.land();
    }
  };

  Drone.prototype.update = function() {
    if (this.altitude < this.targetAltitude) {
      this.altitude += 2;
      if (this.altitude > this.targetAltitude) this.altitude = this.targetAltitude;
    } else if (this.altitude > this.targetAltitude) {
      this.altitude -= 2;
      if (this.altitude < this.targetAltitude) this.altitude = this.targetAltitude;
    }

    if (this.altitude === 0 && this.targetAltitude === 0) {
      this.flying = false;
    }

    if (this.flying && this.altitude > 0) {
      this.path.push({ x: this.x, y: this.y });
      if (this.path.length > 3000) {
        this.path.shift();
      }
      this.consumeBattery(0.01);
    }

    if (this.circleMode) {
      this.runCircleMode();
    } else if (this.autoMode) {
      this.runAutoMode();
    }

    this.keepInBounds();

    if (!this.circleMode && !this.autoMode && this.flying) {
      this.modeText = "手動飛行";
    }
    if (!this.flying && this.altitude === 0) {
      this.modeText = "停止中";
    }
  };

  Drone.prototype.runAutoMode = function() {
    if (!this.flying || this.altitude <= 0) return;

    if (!this.currentCommand) {
      if (this.autoCommands.length === 0) {
        this.autoMode = false;
        this.modeText = "手動飛行";
        return;
      }
      this.currentCommand = {
        type: this.autoCommands[0].type,
        value: this.autoCommands[0].value
      };
      this.autoCommands.shift();
    }

    var step;
    if (this.currentCommand.type === "move") {
      step = Math.min(2.5, this.currentCommand.value);
      this.moveInYawDirection(step);
      this.currentCommand.value -= step;
      this.consumeBattery(0.03);
      if (this.currentCommand.value <= 0) this.currentCommand = null;
    } else if (this.currentCommand.type === "rotate") {
      step = Math.min(3, this.currentCommand.value);
      this.angle += step;
      this.currentCommand.value -= step;
      this.consumeBattery(0.01);
      if (this.currentCommand.value <= 0) this.currentCommand = null;
    }
  };

  Drone.prototype.runCircleMode = function() {
    if (!this.flying || this.altitude <= 0) return;

    this.circleAngle += this.circleSpeed;
    this.circleDoneAngle += this.circleSpeed;

    var rad = this.circleAngle * Math.PI / 180;
    this.x = this.circleCenterX + Math.cos(rad) * this.circleRadius;
    this.y = this.circleCenterY + Math.sin(rad) * this.circleRadius;

    this.angle = this.circleAngle + 90;
    this.consumeBattery(0.025);

    if (this.circleDoneAngle >= 360 * this.circleRounds) {
      this.circleMode = false;
      this.modeText = "手動飛行";
    }
  };

  Drone.prototype.keepInBounds = function() {
    this.x = clamp(this.x, 30, canvas.width - 30);
    this.y = clamp(this.y, 50, canvas.height - 50);
  };

  Drone.prototype.draw = function() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    this.drawGrid();
    this.drawStartMarker();
    this.drawPath();
    this.drawShadow();
    this.drawDrone();
    this.drawBatteryBar();
  };

  Drone.prototype.drawGrid = function() {
    ctx.save();
    ctx.strokeStyle = "#e8e8e8";
    ctx.lineWidth = 1;

    for (var x = 0; x <= canvas.width; x += 50) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();
    }

    for (var y = 0; y <= canvas.height; y += 50) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvas.width, y);
      ctx.stroke();
    }
    ctx.restore();
  };

  Drone.prototype.drawStartMarker = function() {
    ctx.save();
    ctx.strokeStyle = "#ff9900";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.arc(this.startX, this.startY, 10, 0, Math.PI * 2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(this.startX - 14, this.startY);
    ctx.lineTo(this.startX + 14, this.startY);
    ctx.moveTo(this.startX, this.startY - 14);
    ctx.lineTo(this.startX, this.startY + 14);
    ctx.stroke();

    ctx.fillStyle = "#cc7700";
    ctx.font = "13px sans-serif";
    ctx.fillText("始点", this.startX + 14, this.startY - 10);

    ctx.restore();
  };

  Drone.prototype.drawPath = function() {
    if (this.path.length < 2) return;

    ctx.save();
    ctx.strokeStyle = "#8ac8ff";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(this.path[0].x, this.path[0].y);

    for (var i = 1; i < this.path.length; i++) {
      ctx.lineTo(this.path[i].x, this.path[i].y);
    }
    ctx.stroke();
    ctx.restore();
  };

  Drone.prototype.drawShadow = function() {
    ctx.save();
    ctx.fillStyle = "rgba(120,120,120,0.4)";
    ctx.beginPath();
    ctx.arc(this.x, this.y, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  };

  Drone.prototype.drawArmRotor = function(rx, ry, color) {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(rx, ry);
    ctx.stroke();

    ctx.strokeStyle = "#222";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(rx, ry, 8, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(rx, ry, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#222";
    ctx.lineWidth = 3;
  };

  Drone.prototype.drawDrone = function() {
    var bodyY = this.y - this.altitude;
    var arm = (canvas.width <= 520) ? 18 : 26;

    ctx.save();
    ctx.translate(this.x, bodyY);
    ctx.rotate(this.angle * Math.PI / 180);

    ctx.strokeStyle = "#222";
    ctx.lineWidth = 3;

    this.drawArmRotor( arm,  arm, "#ff6666");
    this.drawArmRotor(-arm,  arm, "#66cc88");
    this.drawArmRotor(-arm, -arm, "#ffdd66");
    this.drawArmRotor( arm, -arm, "#ffffff");

    ctx.fillStyle = "#4e8ef7";
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#ff3333";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(16, 0);
    ctx.stroke();

    ctx.restore();

    if (this.altitude > 0) {
      ctx.save();
      ctx.strokeStyle = "#999";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x, bodyY);
      ctx.stroke();
      ctx.restore();
    }
  };

  Drone.prototype.drawBatteryBar = function() {
    var color = "#33aa66";
    if (this.battery < 50) color = "#d9a227";
    if (this.battery < 20) color = "#d9534f";

    ctx.save();
    ctx.fillStyle = "#222";
    ctx.font = "14px sans-serif";
    ctx.fillText("Battery", 16, 24);

    ctx.strokeStyle = "#444";
    ctx.lineWidth = 2;
    ctx.strokeRect(80, 10, 100, 18);

    ctx.fillStyle = color;
    ctx.fillRect(80, 10, 100 * (this.battery / 100), 18);

    ctx.fillStyle = "#222";
    ctx.fillText(Math.round(this.battery) + "%", 188, 24);
    ctx.restore();
  };

  var drone = new Drone(250, 170);

  function resizeCanvas() {
    var w, h;

    if (window.innerWidth <= 768) {
      w = Math.min(window.innerWidth * 0.82, 520);
      h = Math.round(w * 0.95);
    } else {
      w = 760;
      h = Math.round(w * 0.684);
    }

    canvas.width = w;
    canvas.height = h;

    drone.startX = clamp(drone.startX, 30, canvas.width - 30);
    drone.startY = clamp(drone.startY, 50, canvas.height - 50);
    drone.x = clamp(drone.x, 30, canvas.width - 30);
    drone.y = clamp(drone.y, 50, canvas.height - 50);
  }

  function updateStatus() {
    var yaw = ((drone.angle % 360) + 360) % 360;
    statusBox.innerHTML =
      "飛行状態: " + (drone.flying ? "飛行中" : "停止中") + "<br>" +
      "高さ: " + drone.altitude + "<br>" +
      "yaw角度: " + yaw + "°<br>" +
      "モード: " + drone.modeText + "<br>" +
      "バッテリー: " + Math.round(drone.battery) + "%<br>" +
      "始点: (" + Math.round(drone.startX) + ", " + Math.round(drone.startY) + ")";
  }

  function loop() {
    drone.update();
    drone.draw();
    updateStatus();
    requestAnimationFrame(loop);
  }

  function bind(id, fn){
    var el = document.getElementById(id);
    if (el) el.onclick = fn;
  }

  bind("droneScTakeoffBtn", function(){ drone.takeoff(); });
  bind("droneScLandBtn", function(){ drone.land(); });
  bind("droneScClearBtn", function(){ drone.clearPath(); });
  bind("droneScResetBtn", function(){ drone.resetToCenter(); });

  bind("droneScYawLeftBtn", function(){ drone.yawLeft(); });
  bind("droneScYawRightBtn", function(){ drone.yawRight(); });
  bind("droneScForwardBtn", function(){ drone.forward(); });
  bind("droneScBackBtn", function(){ drone.back(); });
  bind("droneScLeftBtn", function(){ drone.left(); });
  bind("droneScRightBtn", function(){ drone.right(); });

  bind("droneScTriangleBtn", function(){ drone.startTriangleMission(); });
  bind("droneScSquareBtn", function(){ drone.startSquareMission(); });

  bind("droneScCircleBtn", function(){
    if (isMobileCanvas()) {
      drone.startCircleMission(30, 1);
    } else {
      drone.startCircleMission(80, 1);
    }
  });

  bind("droneScPolygonBtn", function(){
    var sides = parseInt(sidesInput.value, 10);
    var length = parseInt(lengthInput.value, 10);

    if (isNaN(sides)) sides = 5;
    if (isNaN(length)) length = 90;

    sides = clamp(sides, 3, 12);
    length = clamp(length, 30, 200);

    sidesInput.value = sides;
    lengthInput.value = length;

    if (isMobileCanvas()) {
      drone.startPolygonMission(sides, Math.max(26, Math.round(length * 0.45)));
    } else {
      drone.startPolygonMission(sides, length);
    }
  });

  bind("droneScSetYawBtn", function(){
    var deg = parseInt(yawInput.value, 10);
    if (isNaN(deg)) deg = 0;
    yawInput.value = ((deg % 360) + 360) % 360;
    drone.setYaw(deg);
  });

  function getCanvasPosition(evt) {
    var rect = canvas.getBoundingClientRect();
    var clientX, clientY;

    if (evt.touches && evt.touches.length > 0) {
      clientX = evt.touches[0].clientX;
      clientY = evt.touches[0].clientY;
    } else {
      clientX = evt.clientX;
      clientY = evt.clientY;
    }

    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;

    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top) * scaleY
    };
  }

  function handleSetStart(evt) {
    evt.preventDefault();
    var pos = getCanvasPosition(evt);
    drone.setStartPosition(pos.x, pos.y);
  }

  canvas.addEventListener("click", handleSetStart);
  canvas.addEventListener("touchstart", handleSetStart, { passive:false });

  resizeCanvas();
  drone.resetToCenter();
  drone.draw();
  updateStatus();

  window.addEventListener("resize", function() {
    resizeCanvas();
    drone.resetToCenter();
    drone.draw();
    updateStatus();
  });

  loop();
})();
</script>

</body>
</html>
